<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Estación 6 · Gymkana STAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#003c6e" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="header">
    <img class="logo" src="assets/logo.svg" alt="Logo STAR" />
    <div class="header-text">Gymkana <strong>STAR</strong></div>
  </header>

  <main class="main">
    <section class="card">
      <div class="progress">
        Estación 6 / 7
        <div class="progress-dots" aria-hidden="true">
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot current"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="question-tag">// Pregunta · Cine</div>
      <p class="question">¿Cómo se llama el pequeño robot basurero, oxidado y amarillo, de la película de Pixar que viaja al espacio buscando a EVA?</p>

      <div class="options">
        <button class="option" data-letter="A" data-answer="r2d2" type="button">R2-D2</button>
        <button class="option" data-letter="B" data-answer="walle" type="button">WALL-E</button>
        <button class="option" data-letter="C" data-answer="terminator" type="button">Terminator</button>
      </div>
    </section>
  </main>

  <footer class="footer">STAR · Student Team of Advanced Robotics · UMA</footer>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="js/trivial.js"></script>
</body>
</html>
