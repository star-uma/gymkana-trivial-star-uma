<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Pista de la estación 5 · Gymkana STAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#003c6e" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="header">
    <img class="logo" src="../assets/logo.svg" alt="Logo STAR" />
    <div class="header-text">Gymkana <strong>STAR</strong></div>
  </header>

  <main class="main">
    <section class="card hint-page">
      <div class="progress">
        5 / 7 superadas
        <div class="progress-dots" aria-hidden="true">
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot current"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="check" aria-hidden="true">✓</div>
      <h2>¡Respuesta correcta!</h2>

      <div class="next-hint">
        <span class="next-tag">// Siguiente pista física</span>
        <p>¿Donde aparcas si eres ciclista?</p>
      </div>

      <div class="scan-indicator">
        <div class="qr-icon" aria-hidden="true"></div>
        <div class="scan-text">
          <strong>Esperando QR</strong>
          Escanea con tu cámara cuando lo encuentres para ver la siguiente pregunta.
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">STAR · Student Team of Advanced Robotics · UMA</footer>
</body>
</html>
