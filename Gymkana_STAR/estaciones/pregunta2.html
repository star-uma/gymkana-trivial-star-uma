<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Estación 2 · Gymkana STAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#003c6e" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="header">
    <img class="logo" src="../assets/logo.svg" alt="Logo STAR" />
    <div class="header-text">Gymkana <strong>STAR</strong></div>
  </header>

  <main class="main">
    <section class="card">
      <div class="progress">
        Estación 2 / 7
        <div class="progress-dots" aria-hidden="true">
          <span class="dot done"></span>
          <span class="dot current"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="question-tag">// Pregunta · Hardware</div>
      <p class="question">Todo robot necesita un "cerebro" para pensar. En robótica educativa usamos mucho una plaquita azul que nació en Italia. ¿Cuál es su nombre?</p>

      <div class="options">
        <button class="option" data-letter="A" data-answer="macaroni" type="button">Macaroni</button>
        <button class="option" data-letter="B" data-answer="raspberry" type="button">Raspberry</button>
        <button class="option" data-letter="C" data-answer="arduino" type="button">Arduino</button>
      </div>
    </section>
  </main>

  <footer class="footer">STAR · Student Team of Advanced Robotics · UMA</footer>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="../js/trivial.js"></script>
</body>
</html>
