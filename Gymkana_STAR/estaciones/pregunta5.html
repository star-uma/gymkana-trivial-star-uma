<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Estación 5 · Gymkana STAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#003c6e" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <header class="header">
    <img class="logo" src="../assets/logo.svg" alt="Logo STAR" />
    <div class="header-text">Gymkana <strong>STAR</strong></div>
  </header>

  <main class="main">
    <section class="card">
      <div class="progress">
        Estación 5 / 7
        <div class="progress-dots" aria-hidden="true">
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot done"></span>
          <span class="dot current"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="question-tag">// Pregunta · Cultura</div>
      <p class="question">¿Qué escritor ruso-estadounidense escribió <em>Yo, Robot</em> y formuló las famosas <em>Tres Leyes de la Robótica</em>?</p>
      <p class="question-meta">Solo el apellido sirve.</p>

      <form id="answer-form" class="answer-form" autocomplete="off">
        <input
          id="answer"
          class="answer-input"
          type="text"
          name="answer"
          placeholder="Escribe tu respuesta..."
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          required
        />
        <button class="btn" type="submit">Enviar respuesta</button>
        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <footer class="footer">STAR · Student Team of Advanced Robotics · UMA</footer>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <script src="../js/trivial.js"></script>
</body>
</html>
